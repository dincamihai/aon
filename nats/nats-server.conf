## team-alpha NATS substrate
## Auth model v1: shared-secret per-user passwords (POC).
## Migrate to NSC/JWT when revocation/rotation needed — see
## .tasks/nsc-jwt-migration.md.

server_name: $TEAM_ALPHA_SERVER_NAME

## Listeners
host:    0.0.0.0
port:    4222          # native client
http:    0.0.0.0:8222  # monitor (jsz, varz, healthz)

websocket {
  host:        0.0.0.0
  port:        8080
  no_tls:      true     # terminate TLS at edge or run on private VPN
  compression: true
}

## Cluster — uncomment + fill in routes when deploying multi-node.
## Single-node JetStream requires this block to be ABSENT (or have ≥1 route).
# cluster {
#   name: team-alpha
#   host: 0.0.0.0
#   port: 6222
#   routes: [
#     "nats-route://nats-1.team-alpha.corp:6222"
#     "nats-route://nats-2.team-alpha.corp:6222"
#   ]
# }

## JetStream
jetstream {
  store_dir:        "/data"
  max_memory_store: 256MB
  max_file_store:   4GB
}

## Auth — passwords loaded from gitignored auth.conf
include "auth.conf"
