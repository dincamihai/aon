## Engine-local NATS substrate (dev convenience).
## Mirrors templates/nats-server.conf — auth model v2: NSC JWTs.
## See .tasks/nsc-jwt-migration.md.
##
## NOTE: this file contains literal placeholders. Run `aon auth render`
## from a per-team repo to substitute them. The engine root's
## docker-compose.yml is for dev only and expects the rendered runtime
## dir to be bind-mounted at /etc/nats/runtime (see compose volumes).

server_name: $AON_SERVER_NAME

host:    0.0.0.0
port:    4222          # native client
http:    0.0.0.0:8222  # monitor (jsz, varz, healthz)

websocket {
  host:        0.0.0.0
  port:        8080
  no_tls:      true
  compression: true
}

jetstream {
  store_dir:        "/data"
  max_memory_store: 256MB
  max_file_store:   4GB
}

operator: @OP_JWT@
system_account: @SYS_ID@
resolver: {
  type: full
  dir: "/etc/nats/runtime/resolver"
  allow_delete: false
  interval: "2m"
}
resolver_preload: {
  @SYS_ID@: @SYS_JWT@
}
