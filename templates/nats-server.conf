## Shared NATS substrate — one server, N team accounts.
## Auth model v2: operator-signed JWTs via NSC.
## See .tasks/nsc-jwt-migration.md for migration history.

server_name: $AON_SERVER_NAME

## Listeners
host:    0.0.0.0
port:    4222          # native client
http:    0.0.0.0:8222  # monitor (jsz, varz, healthz)

websocket {
  host:        0.0.0.0
  port:        8080
  no_tls:      true     # terminate TLS at edge or run on private VPN
  compression: true
}

## Cluster — uncomment + fill in routes when deploying multi-node.
## Single-node JetStream requires this block to be ABSENT (or have ≥1 route).
# cluster {
#   name: aon
#   host: 0.0.0.0
#   port: 6222
#   routes: [
#     "nats-route://nats-1.aon.corp:6222"
#     "nats-route://nats-2.aon.corp:6222"
#   ]
# }

## JetStream
jetstream {
  store_dir:        "/data"
  max_memory_store: 256MB
  max_file_store:   4GB
}

## Auth — operator-signed JWTs (NSC). The operator JWT and SYS account
## JWT are inlined here; per-team account JWTs live on disk under the
## shared resolver dir, populated by `aon auth render` per team.
## Per-role `.creds` files are distributed via `aon creds`.
##
## Placeholders @OP_JWT@ / @SYS_ID@ / @SYS_JWT@ are substituted by
## `_render_shared_server_conf`. Until rendered, this file is a template
## — the server cannot start with literal placeholders.
operator: @OP_JWT@
system_account: @SYS_ID@
resolver: {
  type: full
  dir: "/etc/nats/runtime/resolver"
  allow_delete: false
  interval: "2m"
}
resolver_preload: {
  @SYS_ID@: @SYS_JWT@
}
